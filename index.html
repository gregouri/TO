<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сервис · Аналитика брака по брендам и артикулам</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;color:#111827;font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;font-size:14px}

header{padding:12px 16px;background:#f8fafc;border-bottom:1px solid #d7dee8;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.logo{font-size:17px;font-weight:900;color:#0284c7;letter-spacing:1px}
.sub{font-size:11px;color:#475569;margin-top:2px}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#16a34a;margin-right:5px;flex-shrink:0}
.dot.err{background:#dc2626}
.dot.loading{background:#ca8a04;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* TOOLBAR */
.toolbar{padding:10px 16px;background:#f8fafc;border-bottom:1px solid #d7dee8}
.tbar-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:6px}
.tbar-row:last-child{margin-bottom:0}
.tbar-label{font-size:11px;color:#0284c7;font-weight:700;white-space:nowrap;min-width:60px}
.tbar-label.mini{min-width:0}
.pill{padding:5px 12px;border:1px solid #d7dee8;background:transparent;color:#475569;font-size:11px;font-weight:700;border-radius:20px;cursor:pointer;transition:all .15s;white-space:nowrap}
.pill.on{background:#0284c7;color:#fff;border-color:#0284c7}
.pill.b-on{background:#7c3aed;color:#fff;border-color:#7c3aed}
.sep{width:1px;height:20px;background:#d7dee8;flex-shrink:0}

.date-inp{padding:4px 8px;background:#fff;border:1px solid #d7dee8;color:#111827;border-radius:6px;font-size:11px;font-family:inherit;cursor:pointer}
.date-inp:focus{outline:none;border-color:#0284c7}
.btn{padding:5px 12px;border:none;color:#fff;font-size:11px;font-weight:700;border-radius:6px;cursor:pointer;white-space:nowrap}
.btn-primary{background:#0284c7}.btn-primary:hover{background:#0ea5e9}
.btn-violet{background:#7c3aed}.btn-violet:hover{background:#9333ea}
.btn-gray{background:#d7dee8;color:#0284c7}.btn-gray:hover{background:#cbd5e1}
.btn-link{background:transparent;color:#475569;border:1px solid #d7dee8;padding:5px 10px}
.btn-link:hover{border-color:#0284c7;color:#0284c7}

.search-inp{padding:4px 10px;background:#fff;border:1px solid #d7dee8;border-radius:6px;font-size:11px;font-family:inherit;width:200px}
.search-inp:focus{outline:none;border-color:#0284c7}

.compare-row{padding:6px 10px;background:#f3f0ff;border:1px solid #ddd6fe;border-radius:8px;display:none;align-items:center;gap:8px;flex-wrap:wrap}
.compare-row.show{display:flex}
.compare-label{font-size:11px;color:#7c3aed;font-weight:700;letter-spacing:0.5px}

/* MAIN */
.main{padding:14px 16px}
.summary{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.si{flex:1;min-width:130px;background:#f8fafc;border:1px solid #d7dee8;border-radius:6px;padding:10px;text-align:center}
.sn{font-size:22px;font-weight:900;line-height:1}
.sd{font-size:10px;color:#475569;margin-top:3px}
.si.brak .sn{color:#dc2626}
.si.ruki .sn{color:#7c3aed}
.si.zayav .sn{color:#ca8a04}
.si .delta{display:block;font-size:11px;font-weight:700;margin-top:4px}
.delta.up{color:#dc2626}
.delta.down{color:#16a34a}
.delta.neu{color:#94a3b8}

/* TABLE container */
.section{background:#f8fafc;border:1px solid #d7dee8;border-radius:8px;padding:14px;margin-bottom:14px}
.section-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:12px}
.section-title{font-size:11px;font-weight:700;color:#475569;letter-spacing:1.5px;text-transform:uppercase}
.section-title b{color:#0284c7;text-transform:none;letter-spacing:0;font-size:14px;margin-left:8px}
.section-title .sub-info{font-weight:400;color:#64748b;font-size:10px;margin-left:6px}
.breadcrumb{font-size:12px;color:#64748b;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.breadcrumb a{color:#0284c7;cursor:pointer;font-weight:700}
.breadcrumb a:hover{text-decoration:underline}

.tbl-wrap{background:#fff;border-radius:6px;overflow:auto;max-height:70vh}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl thead{position:sticky;top:0;background:#fff;z-index:5}
.tbl th{text-align:left;font-size:10px;color:#64748b;font-weight:700;padding:10px 8px;border-bottom:2px solid #d7dee8;white-space:nowrap;cursor:pointer;user-select:none;text-transform:uppercase;letter-spacing:0.5px;background:#fff}
.tbl th:hover{color:#0284c7;background:#f8fafc}
.tbl th.sorted{color:#0284c7}
.tbl th .arrow{display:inline-block;margin-left:3px;font-size:9px}
.tbl td{padding:9px 8px;border-bottom:1px solid #e5e7eb;vertical-align:middle}
.tbl tr:hover td{background:#f8fafc}
.tbl tr:last-child td{border-bottom:none}
.tbl-clickable{cursor:pointer}
.tbl-clickable:hover td{background:#eff6ff !important}
.num{text-align:right;font-feature-settings:'tnum';font-variant-numeric:tabular-nums;white-space:nowrap}
.num-strong{font-weight:700;color:#111827}
.num-blue{color:#0284c7;font-weight:700}
.num-zero{color:#cbd5e1}
.brand-cell{font-weight:700;color:#0284c7}
.sku-cell{font-family:Menlo,Monaco,Consolas,monospace;font-weight:700;color:#0284c7;font-size:11px;white-space:nowrap}
.cm-cell{font-size:11px;color:#475569}
.name-cell{font-size:11px;color:#475569;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.doc-text{font-size:11px;color:#475569;max-width:340px;line-height:1.4;word-break:break-word}

.tag{display:inline-block;padding:2px 8px;font-size:10px;font-weight:700;border-radius:10px;letter-spacing:0.3px}
.tag.brak{background:#fee2e2;color:#b91c1c}
.tag.ruki{background:#ede9fe;color:#6d28d9}
.tag.zayav{background:#fef3c7;color:#92400e}

.pct-bar{display:inline-flex;align-items:center;gap:6px;min-width:90px}
.pct-bar .track{flex:1;height:5px;background:#e2e8f0;border-radius:1px;overflow:hidden;min-width:40px}
.pct-bar .track > div{height:100%}
.pct-bar .num{font-weight:700;min-width:42px;text-align:right;font-size:11px}

/* compare deltas */
.cmp-cell{display:flex;flex-direction:column;align-items:flex-end;gap:1px;font-size:11px;line-height:1.2}
.cmp-now{font-weight:700;color:#111827}
.cmp-was{color:#94a3b8;font-size:10px}
.cmp-delta{font-size:10px;font-weight:700}
.cmp-delta.up{color:#dc2626}
.cmp-delta.down{color:#16a34a}
.cmp-delta.neu{color:#94a3b8}
.cmp-arrow{display:inline-block;margin-right:1px}

.empty{padding:40px;text-align:center;color:#64748b;font-size:13px}
.err-box{background:#fff1f2;border:1px solid #dc2626;border-radius:6px;padding:14px;font-size:12px;color:#b91c1c;line-height:1.7;margin:14px}
.cache-badge{font-size:10px;color:#64748b;padding:3px 8px;background:#e5e7eb;border-radius:4px;border:1px solid #d7dee8}

.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:#dbeafe;color:#1d4ed8;border-radius:10px;font-size:11px;font-weight:700}
.chip .x{cursor:pointer;opacity:.6;font-weight:900;font-size:13px;line-height:1}
.chip .x:hover{opacity:1}

.setup-help{margin:10px 16px 0;padding:10px 14px;background:#fffbeb;border:1px solid #fde68a;border-radius:6px;font-size:12px;color:#78350f;line-height:1.6}
.setup-help b{color:#451a03}
.setup-help code{background:#fef3c7;padding:1px 6px;border-radius:3px;font-size:11px;font-family:Menlo,Monaco,Consolas,monospace}
.setup-help summary{cursor:pointer;font-weight:700;color:#92400e}

.mini-help{font-size:10px;color:#94a3b8;font-style:italic;margin-top:4px;display:block}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">🔧 СЕРВИС · АНАЛИТИКА</div>
  
  <div style="display:flex;align-items:center;gap:8px">
    <span class="cache-badge" id="cache-info">—</span>
    <span style="font-size:11px;color:#64748b;display:flex;align-items:center">
      <span class="dot loading" id="dot"></span><span id="upd-time">Загрузка...</span>
    </span>
  </div>
</header>

<div class="toolbar">
  <!-- ROW 1: PERIOD A -->
  <div class="tbar-row">
    <span class="tbar-label">Период:</span>
    <button class="pill on" data-pa="all"     onclick="setPresetA('all')">Всё время</button>
    <button class="pill"    data-pa="ytd"     onclick="setPresetA('ytd')">Этот год</button>
    <button class="pill"    data-pa="quarter" onclick="setPresetA('quarter')">Этот квартал</button>
    <button class="pill"    data-pa="month"   onclick="setPresetA('month')">Этот месяц</button>
    <button class="pill"    data-pa="30"      onclick="setPresetA('30')">30 дней</button>
    <button class="pill"    data-pa="7"       onclick="setPresetA('7')">7 дней</button>
    <span class="sep"></span>
    <input type="date" id="da-from" class="date-inp">
    <span style="color:#64748b;font-size:11px">—</span>
    <input type="date" id="da-to" class="date-inp">
    <button class="btn btn-primary" onclick="applyCustomA()">Применить</button>
  </div>

  <!-- ROW 2: COMPARE TOGGLE -->
  <div class="tbar-row">
    <span class="tbar-label mini">Сравнение:</span>
    <button class="pill" id="cmp-toggle" onclick="toggleCompare()">⇄ Сравнить с другим периодом</button>
    <span class="mini-help">когда включено — рядом с цифрами появятся дельты</span>
  </div>

  <!-- ROW 3: PERIOD B (compare) -->
  <div class="tbar-row compare-row" id="cmp-row">
    <span class="compare-label">Период B:</span>
    <button class="pill" data-pb="prev_month"   onclick="setPresetB('prev_month')">Прошлый месяц</button>
    <button class="pill" data-pb="prev_quarter" onclick="setPresetB('prev_quarter')">Прошлый квартал</button>
    <button class="pill" data-pb="prev_year"    onclick="setPresetB('prev_year')">Год назад (тот же интервал)</button>
    <button class="pill" data-pb="prev_period"  onclick="setPresetB('prev_period')">Предыдущий равный период</button>
    <span class="sep"></span>
    <input type="date" id="db-from" class="date-inp">
    <span style="color:#64748b;font-size:11px">—</span>
    <input type="date" id="db-to" class="date-inp">
    <button class="btn btn-violet" onclick="applyCustomB()">Применить B</button>
  </div>

  <!-- ROW 4: SEARCH -->
  <div class="tbar-row">
    <span class="tbar-label mini">Поиск:</span>
    <input type="text" id="search-inp" class="search-inp" placeholder="артикул / наименование / кат. менеджер" oninput="onSearchChange()">
    <span class="sep"></span>
    <button class="btn btn-gray" onclick="loadFresh()">↻ Обновить данные</button>
  </div>
</div>


<div class="main">

  <!-- SUMMARY -->
  <div class="summary" id="summary"></div>

  <!-- TABLE SECTION -->
  <div class="section">
    <div class="section-head">
      <div>
        <div class="section-title" id="tbl-title">Бренды</div>
        <div class="breadcrumb" id="breadcrumb" style="margin-top:6px"></div>
      </div>
      <div id="tbl-meta" style="font-size:11px;color:#64748b"></div>
    </div>
    <div class="tbl-wrap" id="tbl-wrap">
      <div class="empty">⏳ Загрузка...</div>
    </div>
  </div>

</div>

<script>
/* ============== CONFIG ============== */
var SHEET_ID  = '16gKmc1OpjdjH6_iGc7mh8h3kX2OzGlfJWcH0Q7gsmfo';
var GID       = '974603460';
var CACHE_KEY = 'svc_docs_v4';
var CACHE_TTL = 60*60*1000;

/* ============== STATE ============== */
var allRows=[];
var presetA='all';
var customA=null; // {from:Date,to:Date}
var presetB=null;
var customB=null;
var compareOn=false;
var searchTerm='';
var view='brands'; // 'brands' | 'skus' | 'docs'
var selectedBrand=null;
var selectedSku=null;
var selectedSkuName='';
var sortKey='deltaPctBrak'; // когда сравнение off — переключим автоматически
var sortDir='desc';

var MONTHS=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
var MONTHS_SHORT=['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];

/* ============== DATA ============== */
function loadData(){
  var cached=getCache();
  if(cached){
    try{ processCSV(cached.txt); setStatus('ok','Кэш '+cached.time);
      document.getElementById('cache-info').textContent='Кэш: '+cached.time;
      render();
    }catch(e){}
  } else { setStatus('loading','Загрузка...'); }

  fetchSheet().then(function(txt){
    processCSV(txt); saveCache(txt);
    setStatus('ok','Обновлено '+timeNow());
    document.getElementById('cache-info').textContent='Обновлено '+timeNow();
    render();
  }).catch(function(e){ if(!allRows.length) handleError(e); });
}

function loadFresh(){
  setStatus('loading','Обновление...');
  fetchSheet().then(function(txt){
    processCSV(txt); saveCache(txt);
    setStatus('ok','Обновлено '+timeNow());
    document.getElementById('cache-info').textContent='Обновлено '+timeNow();
    render();
  }).catch(handleError);
}

function fetchSheet(){
  var url='https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/export?format=csv&gid='+GID+'&t='+Date.now();
  return fetch(url).then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.text(); });
}
function saveCache(txt){ try{ localStorage.setItem(CACHE_KEY,JSON.stringify({txt:txt,ts:Date.now(),time:timeNow()})); }catch(e){} }
function getCache(){ try{ var o=JSON.parse(localStorage.getItem(CACHE_KEY)||'null'); return o&&(Date.now()-o.ts<CACHE_TTL)?o:null; }catch(e){return null;} }
function handleError(e){
  setStatus('err','Ошибка');
  document.getElementById('tbl-wrap').innerHTML=
    '<div class="err-box">⚠️ Не удалось загрузить данные.<br>'+esc(e.message)+'<br><br>Откройте доступ к таблице (<b>Файл → Поделиться → Все у кого есть ссылка → Читатель</b>) либо опубликуйте её (<b>Файл → Опубликовать в интернете → CSV</b>).</div>';
}
function setStatus(s,t){ var d=document.getElementById('dot'); d.className='dot'+(s==='err'?' err':s==='loading'?' loading':''); document.getElementById('upd-time').textContent=t; }
function timeNow(){ var n=new Date(); return ('0'+n.getHours()).slice(-2)+':'+('0'+n.getMinutes()).slice(-2); }

/* ============== CSV ============== */
function parseCSVLine(line){
  var cols=[],inq=false,cur='';
  for(var j=0;j<line.length;j++){
    var ch=line[j];
    if(ch==='"'){
      if(inq && line[j+1]==='"'){ cur+='"'; j++; }
      else inq=!inq;
    } else if(ch===',' && !inq){ cols.push(cur); cur=''; }
    else cur+=ch;
  }
  cols.push(cur);
  return cols;
}
function splitCSVRecords(txt){
  var out=[], cur='', inq=false;
  for(var i=0;i<txt.length;i++){
    var ch=txt[i];
    if(ch==='"'){
      if(inq && txt[i+1]==='"'){ cur+='""'; i++; }
      else { inq=!inq; cur+=ch; }
    } else if((ch==='\n' || ch==='\r') && !inq){
      if(ch==='\r' && txt[i+1]==='\n') i++;
      if(cur.length) out.push(cur);
      cur='';
    } else cur+=ch;
  }
  if(cur.length) out.push(cur);
  return out;
}
function parseDate(s){
  if(!s) return null;
  s=String(s).trim();
  var m=s.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})/);
  if(m) return new Date(+m[3],+m[2]-1,+m[1]);
  if(/^\d{4}-\d{2}-\d{2}/.test(s)){ var p=s.slice(0,10).split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }
  var d=new Date(s); return isNaN(d)?null:d;
}
function dkey(d){ return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); }

function classifyAppeal(v){
  v=String(v||'').trim();
  if(v==='Брак'||v==='Руки'||v==='Заявка') return v;
  return 'Прочее';
}

function processCSV(txt){
  var records=splitCSVRecords(txt);
  if(records.length<2){ allRows=[]; return; }
  var headerRow=parseCSVLine(records[0]).map(function(s){return String(s||'').trim();});
  if(headerRow.indexOf('Действие')!==-1 && headerRow.indexOf('Сообщение')!==-1){
    throw new Error('Загружен лист «Лог загрузки» вместо «Документы сервиса». Замените GID в HTML.');
  }
  if(!/Брэнд|Артикул|Тип обращения/.test(headerRow.join(' '))){
    throw new Error('В CSV не найдены ключевые колонки (Брэнд / Артикул / Тип обращения).');
  }

  var nameMap={
    docNum:'Документ cервиса.Номер', docDate:'Документ cервиса.Дата',
    service:'Тип услуги', master:'Мастер', manager:'Менеджер',
    fault:'Неисправность', comment:'Комментарий менеджера',
    brand:'Брэнд', sku:'Оборудование.Оборудование.Артикул',
    name:'Оборудование.Оборудование.Наименование',
    catMgr:'Оборудование.Оборудование.Категорийный менеджер',
    receiver:'Приемщик', diagnose:'Результат диагностики', appeal:'Тип обращения'
  };
  var idx={};
  Object.keys(nameMap).forEach(function(k){ idx[k]=headerRow.indexOf(nameMap[k]); });

  allRows=[];
  for(var r=1;r<records.length;r++){
    var line=records[r];
    if(!line || !line.replace(/[\s,"]/g,'').length) continue;
    var c=parseCSVLine(line);
    var brand=(c[idx.brand]||'').trim();
    var sku=(c[idx.sku]||'').trim();
    var docNum=(c[idx.docNum]||'').trim();
    if(!brand && !sku && !docNum) continue;
    var d=parseDate(c[idx.docDate]);
    allRows.push({
      docNum:docNum, date:d, dateKey:d?dkey(d):'',
      service:(c[idx.service]||'').trim(),
      master:(c[idx.master]||'').trim(),
      brand:brand, sku:sku,
      name:(c[idx.name]||'').trim(),
      catMgr:(c[idx.catMgr]||'').trim(),
      fault:(c[idx.fault]||'').trim(),
      diagnose:(c[idx.diagnose]||'').trim(),
      appeal:classifyAppeal(c[idx.appeal])
    });
  }
  setDateBounds();
}

function setDateBounds(){
  if(!allRows.length) return;
  var sorted=allRows.filter(function(r){return r.date;}).sort(function(a,b){return a.date-b.date;});
  if(!sorted.length) return;
  var minD=dkey(sorted[0].date), maxD=dkey(sorted[sorted.length-1].date);
  ['da-from','da-to','db-from','db-to'].forEach(function(id){
    var el=document.getElementById(id); el.min=minD; el.max=maxD;
  });
}

/* ============== PERIOD RESOLUTION ============== */
function resolvePeriodA(){
  if(presetA==='custom' && customA) return customA;
  var now=new Date();
  if(presetA==='all') return null; // no filter
  if(presetA==='ytd') return {from:new Date(now.getFullYear(),0,1), to:endOfDay(now)};
  if(presetA==='quarter'){ var q=Math.floor(now.getMonth()/3); return {from:new Date(now.getFullYear(),q*3,1), to:endOfDay(now)}; }
  if(presetA==='month') return {from:new Date(now.getFullYear(),now.getMonth(),1), to:endOfDay(now)};
  if(presetA==='30'){ var f=new Date(now); f.setDate(f.getDate()-30); f.setHours(0,0,0,0); return {from:f, to:endOfDay(now)}; }
  if(presetA==='7'){ var f2=new Date(now); f2.setDate(f2.getDate()-7); f2.setHours(0,0,0,0); return {from:f2, to:endOfDay(now)}; }
  return null;
}
function endOfDay(d){ var x=new Date(d); x.setHours(23,59,59,999); return x; }

function resolvePeriodB(){
  if(!compareOn) return null;
  if(presetB==='custom' && customB) return customB;
  var A=resolvePeriodA();
  var now=new Date();
  if(presetB==='prev_month'){
    var f=new Date(now.getFullYear(),now.getMonth()-1,1);
    var t=new Date(now.getFullYear(),now.getMonth(),0); t.setHours(23,59,59,999);
    return {from:f,to:t};
  }
  if(presetB==='prev_quarter'){
    var q=Math.floor(now.getMonth()/3);
    var f=new Date(now.getFullYear(), (q-1)*3, 1);
    if(q===0) f=new Date(now.getFullYear()-1, 9, 1);
    var t=new Date(f.getFullYear(), f.getMonth()+3, 0); t.setHours(23,59,59,999);
    return {from:f,to:t};
  }
  if(presetB==='prev_year' && A){
    var f=new Date(A.from); f.setFullYear(f.getFullYear()-1);
    var t=new Date(A.to); t.setFullYear(t.getFullYear()-1);
    return {from:f,to:t};
  }
  if(presetB==='prev_period' && A){
    var span=A.to-A.from;
    var t=new Date(A.from.getTime()-1);
    var f=new Date(t.getTime()-span);
    return {from:f,to:t};
  }
  return null;
}

function fmtDateRus(d){ if(!d) return '—'; return ('0'+d.getDate()).slice(-2)+'.'+('0'+(d.getMonth()+1)).slice(-2)+'.'+d.getFullYear(); }
function periodLabel(p){
  if(!p) return 'всё время';
  return fmtDateRus(p.from)+' — '+fmtDateRus(p.to);
}

/* ============== FILTERS ============== */
function setPresetA(p){

  document.getElementById('da-to').value='';

function applyCustomA(){

function toggleCompare(){

function setPresetB(p){

function applyCustomB(){
  var f=document.getElementById('db-from').value;
  var t=document.getElementById('db-to').value;
  if(!f && !t) return;

var searchTimer;
function onSearchChange(){
  clearTimeout(searchTimer);
  searchTimer=setTimeout(function(){
    searchTerm=document.getElementById('search-inp').value.trim().toLowerCase();
    render();
  },200);

/* ============== AGGREGATION ============== */
function rowsInPeriod(period){
  if(!period) return allRows.slice(); // все
  return allRows.filter(function(r){
    if(!r.date) return false;
    return r.date>=period.from && r.date<=period.to;
  });
}

function applySearch(rows){
  if(!searchTerm) return rows;
  return rows.filter(function(r){
    var hay=(r.brand+' '+r.sku+' '+r.name+' '+r.catMgr).toLowerCase();
    return hay.indexOf(searchTerm)!==-1;
  });
}

function aggregate(rows, keyFn, extraFn){
  var m={};
  rows.forEach(function(r){
    var k=keyFn(r);
    if(!k) return;
    if(!m[k]){
      m[k]={key:k,total:0,'Брак':0,'Руки':0,'Заявка':0,'Прочее':0};
      if(extraFn) extraFn(m[k], r);
    }
    m[k].total++;
    m[k][r.appeal]++;
  });
  var out=[];
  for(var k in m){
    var o=m[k];
    o.pctBrak=o.total?(o['Брак']/o.total*100):0;
    out.push(o);
  }
  return out;
}

function buildRows(){
  var pA=resolvePeriodA();
  var pB=resolvePeriodB();
  var rowsA=applySearch(rowsInPeriod(pA));
  var rowsB=compareOn?applySearch(rowsInPeriod(pB)):[];

  if(view==='brands'){
    return mergeAggs(
      aggregate(rowsA, function(r){return r.brand;}),
      aggregate(rowsB, function(r){return r.brand;})
    );
  } else if(view==='skus') {
    var inBrand=function(r){return r.brand===selectedBrand;};
    var rA=rowsA.filter(inBrand), rB=rowsB.filter(inBrand);
    return mergeAggs(
      aggregate(rA, function(r){return r.sku;}, function(o,r){o.name=r.name; o.catMgr=r.catMgr; o.brand=r.brand;}),
      aggregate(rB, function(r){return r.sku;})
    );
  } else { // docs — список самих обращений (без агрегации, без B)
    return rowsA.filter(function(r){return r.brand===selectedBrand && r.sku===selectedSku;});
  }
}

function mergeAggs(aggA, aggB){
  var byKey={};
  aggA.forEach(function(o){ byKey[o.key]={a:o,b:null}; });
  aggB.forEach(function(o){ if(byKey[o.key]) byKey[o.key].b=o; else byKey[o.key]={a:null,b:o}; });

  var out=[];
  for(var k in byKey){
    var a=byKey[k].a, b=byKey[k].b;
    var row={
      key:k,
      name:(a&&a.name)||(b&&b.name)||'',
      catMgr:(a&&a.catMgr)||(b&&b.catMgr)||'',
      brand:(a&&a.brand)||(b&&b.brand)||'',
      total:a?a.total:0,
      brak:a?a['Брак']:0,
      ruki:a?a['Руки']:0,
      zayav:a?a['Заявка']:0,
      pctBrak:a?a.pctBrak:0,
      // B
      total_b:b?b.total:0,
      brak_b:b?b['Брак']:0,
      ruki_b:b?b['Руки']:0,
      zayav_b:b?b['Заявка']:0,
      pctBrak_b:b?b.pctBrak:0
    };
    row.deltaTotal=row.total-row.total_b;
    row.deltaBrak=row.brak-row.brak_b;
    row.deltaRuki=row.ruki-row.ruki_b;
    row.deltaZayav=row.zayav-row.zayav_b;
    row.deltaPctBrak=row.pctBrak-row.pctBrak_b;
    out.push(row);
  }
  return out;
}

/* ============== RENDER ============== */
function render(){
  renderSummary();
  renderBreadcrumb();
  renderTable();
}

function renderSummary(){
  var pA=resolvePeriodA();
  var pB=resolvePeriodB();
  var rowsA=applySearch(rowsInPeriod(pA));
  if((view==='skus' || view==='docs') && selectedBrand) rowsA=rowsA.filter(function(r){return r.brand===selectedBrand;});
  if(view==='docs' && selectedSku) rowsA=rowsA.filter(function(r){return r.sku===selectedSku;});
  var rowsB=compareOn?applySearch(rowsInPeriod(pB)):[];
  if((view==='skus' || view==='docs') && selectedBrand && compareOn) rowsB=rowsB.filter(function(r){return r.brand===selectedBrand;});
  if(view==='docs' && selectedSku && compareOn) rowsB=rowsB.filter(function(r){return r.sku===selectedSku;});

  var cA=countByAppeal(rowsA), cB=countByAppeal(rowsB);
  var totalA=rowsA.length, totalB=rowsB.length;
  var pctBrakA=totalA?(cA['Брак']/totalA*100):0;
  var pctBrakB=totalB?(cB['Брак']/totalB*100):0;

  var skuSet={}, brandSet={};
  rowsA.forEach(function(r){ if(r.sku) skuSet[r.sku]=true; if(r.brand) brandSet[r.brand]=true; });

  function makeCard(label, valA, valB, kind, isPct){
    var deltaHtml='';
    if(compareOn){
      var d = isPct ? (valA-valB) : (valA-valB);
      var dClass = Math.abs(d)<0.01 ? 'neu' : (kind==='good' ? (d>0?'down':'up') : (d>0?'up':'down'));
      var arrow = Math.abs(d)<0.01 ? '→' : (d>0?'↑':'↓');
      var dStr = isPct ? (Math.abs(d).toFixed(1)+'%') : Math.abs(d);
      var wasStr = isPct ? (valB.toFixed(1)+'%') : valB;
      deltaHtml='<span class="delta '+dClass+'">'+arrow+' '+dStr+' <span style="font-weight:400;color:#94a3b8">было '+wasStr+'</span></span>';
    }
    var displayVal = isPct ? (valA.toFixed(1)+'%') : valA;
    var cls = kind==='brak'?'brak':kind==='ruki'?'ruki':kind==='zayav'?'zayav':'';
    return '<div class="si '+cls+'"><div class="sn">'+displayVal+'</div><div class="sd">'+label+'</div>'+deltaHtml+'</div>';
  }

  var html='';
  html+=makeCard('обращений', totalA, totalB, 'neutral', false);
  html+=makeCard('брак', cA['Брак'], cB['Брак'], 'brak', false);
  html+=makeCard('руки', cA['Руки'], cB['Руки'], 'ruki', false);
  html+=makeCard('заявок', cA['Заявка'], cB['Заявка'], 'zayav', false);
  html+=makeCard('% брака', pctBrakA, pctBrakB, 'brak', true);
  html+='<div class="si"><div class="sn">'+Object.keys(skuSet).length+'</div><div class="sd">артикулов · '+Object.keys(brandSet).length+' брендов</div></div>';

  document.getElementById('summary').innerHTML=html;
}

function countByAppeal(rows){
  var c={'Брак':0,'Руки':0,'Заявка':0,'Прочее':0};
  rows.forEach(function(r){ c[r.appeal]++; });
  return c;
}

function renderBreadcrumb(){
  var pA=resolvePeriodA();
  var pB=resolvePeriodB();
  var bc=document.getElementById('breadcrumb');
  var parts=[];

  if(view==='brands'){
    parts.push('<span style="color:#0284c7;font-weight:700">Все бренды</span>');
  } else if(view==='skus') {
    parts.push('<a onclick="goToBrands()">Все бренды</a>');
    parts.push('<span style="color:#111827;font-weight:700">'+esc(selectedBrand)+'</span>');
  } else {
    parts.push('<a onclick="goToBrands()">Все бренды</a>');
    parts.push('<a onclick="goToSkus(\''+String(selectedBrand).replace(/'/g,"\\'")+'\')">'+esc(selectedBrand)+'</a>');
    parts.push('<span style="color:#111827;font-weight:700">'+esc(selectedSku)+(selectedSkuName?' · '+esc(selectedSkuName):'')+'</span>');
  }
  parts.push('<span style="color:#cbd5e1">·</span>');
  parts.push('<span><b>Период A:</b> '+esc(periodLabel(pA))+'</span>');
  if(compareOn){
    parts.push('<span style="color:#cbd5e1">·</span>');
    parts.push('<span style="color:#7c3aed"><b>Период B:</b> '+esc(periodLabel(pB))+'</span>');
  }
  if(searchTerm){
    parts.push('<span style="color:#cbd5e1">·</span>');
    parts.push('<span class="chip">поиск: '+esc(searchTerm)+' <span class="x" onclick="clearSearch()">✕</span></span>');
  }
  bc.innerHTML=parts.join(' ');

  var titleHtml;
  if(view==='brands') titleHtml='Бренды<b> </b><span class="sub-info">— клик по строке открывает артикулы</span>';
  else if(view==='skus') titleHtml='Артикулы<b>'+esc(selectedBrand)+'</b><span class="sub-info">— клик по строке открывает документы сервиса</span>';
  else titleHtml='Документы сервиса<b>'+esc(selectedSku)+'</b>';
  document.getElementById('tbl-title').innerHTML = titleHtml;
}
function goToBrands(){ view='brands'; selectedBrand=null; selectedSku=null; selectedSkuName='';
  if(compareOn){ sortKey='deltaPctBrak'; } else { sortKey='pctBrak'; }
  sortDir='desc';
  render();
}
function goToSkus(brand){ view='skus'; selectedBrand=brand; selectedSku=null; selectedSkuName='';
  if(compareOn){ sortKey='deltaPctBrak'; } else { sortKey='pctBrak'; }
  sortDir='desc';
  render();
}
function goToDocs(sku, name){ view='docs'; selectedSku=sku; selectedSkuName=name||'';
  // в режиме документов сравнение не имеет смысла (сами строки), сортируем по дате убыв.
  sortKey='date'; sortDir='desc';
  render();
}
function clearSearch(){ document.getElementById('search-inp').value=''; searchTerm=''; render(); }

/* ============== TABLE ============== */
function renderTable(){
  var rows=buildRows();
  // фильтр пустых строк только для агрегатов (в режиме docs у нас сами строки)
  if(view!=='docs') rows=rows.filter(function(r){ return r.total>0 || r.total_b>0; });

  // сортировка
  rows.sort(function(a,b){
    var va=a[sortKey], vb=b[sortKey];
    var cmp;
    if(va instanceof Date || vb instanceof Date){
      cmp=(va?va.getTime():0)-(vb?vb.getTime():0);
    } else if(typeof va==='number' || typeof vb==='number'){
      cmp=(va||0)-(vb||0);
    } else {
      cmp=String(va||'').localeCompare(String(vb||''),'ru');
    }
    return sortDir==='desc' ? -cmp : cmp;
  });

  var metaLabel = view==='brands' ? ' брендов' : (view==='skus' ? ' артикулов' : ' документов');
  document.getElementById('tbl-meta').textContent = rows.length + metaLabel;

  if(!rows.length){
    document.getElementById('tbl-wrap').innerHTML='<div class="empty">Нет данных под выбранные фильтры</div>';
    return;
  }

  var html='<table class="tbl"><thead><tr>';
  var cols=getColumns();
  cols.forEach(function(c){
    var sorted = sortKey===c.k;
    var arrow = sorted ? '<span class="arrow">'+(sortDir==='desc'?'▼':'▲')+'</span>' : '';
    html+='<th data-k="'+c.k+'" class="'+(sorted?'sorted ':'')+(c.numeric?'num':'')+'" style="'+(c.width?'width:'+c.width:'')+'">'+c.label+arrow+'</th>';
  });
  html+='</tr></thead><tbody>';

  // максимумы для шкал в pct-bar (только для агрегатных режимов)
  var maxPct=10;
  if(view!=='docs'){
    maxPct=Math.max.apply(null, rows.map(function(r){return Math.max(r.pctBrak, r.pctBrak_b||0);}));
    if(maxPct<10) maxPct=10;
  }

  rows.forEach(function(r){
    var clickable='';
    if(view==='brands'){
      clickable=' class="tbl-clickable" onclick="goToSkus(\''+String(r.key).replace(/'/g,"\\'")+'\')"';
    } else if(view==='skus'){
      var skuKey=String(r.key).replace(/'/g,"\\'");
      var nameAttr=String(r.name||'').replace(/'/g,"\\'");
      clickable=' class="tbl-clickable" onclick="goToDocs(\''+skuKey+'\',\''+nameAttr+'\')"';
    }
    html+='<tr'+clickable+'>';
    cols.forEach(function(c){ html+=c.render(r, maxPct); });
    html+='</tr>';
  });
  html+='</tbody></table>';
  document.getElementById('tbl-wrap').innerHTML=html;

  document.querySelectorAll('.tbl th[data-k]').forEach(function(th){
    th.addEventListener('click', function(){
      var k=th.getAttribute('data-k');
      if(sortKey===k) sortDir=(sortDir==='desc'?'asc':'desc');
      else { sortKey=k; sortDir='desc'; }
      renderTable();
    });
  });
}

function deltaCellNum(now, was){
  if(!compareOn) return '<td class="num"><span class="num-strong">'+(now||'<span class="num-zero">·</span>')+'</span></td>';
  var d=now-was;
  var cls = d===0?'neu':(d>0?'up':'down'); // для брак/руки/заявка/обращений: больше = хуже (красное)
  var arrow = d===0?'→':(d>0?'↑':'↓');
  return '<td class="num"><div class="cmp-cell">'+
    '<span class="cmp-now">'+(now||0)+'</span>'+
    '<span class="cmp-was">было '+(was||0)+'</span>'+
    '<span class="cmp-delta '+cls+'"><span class="cmp-arrow">'+arrow+'</span>'+(d===0?'0':(d>0?'+':'')+d)+'</span>'+
    '</div></td>';
}
function deltaCellPct(now, was, maxPct){
  var bar = (now/maxPct*100);
  var col = now<10?'#16a34a':now<25?'#ca8a04':now<40?'#ea580c':'#dc2626';
  var primary = '<div class="pct-bar"><div class="track"><div style="width:'+Math.min(100,bar)+'%;background:'+col+'"></div></div><span class="num" style="color:'+col+'">'+now.toFixed(1)+'%</span></div>';
  if(!compareOn) return '<td>'+primary+'</td>';
  var d=now-was;
  var cls = Math.abs(d)<0.05?'neu':(d>0?'up':'down');
  var arrow = Math.abs(d)<0.05?'→':(d>0?'↑':'↓');
  return '<td><div style="display:flex;flex-direction:column;gap:2px;align-items:flex-end">'+
    primary+
    '<span class="cmp-was">было '+was.toFixed(1)+'%</span>'+
    '<span class="cmp-delta '+cls+'"><span class="cmp-arrow">'+arrow+'</span>'+(d===0?'0%':(d>0?'+':'')+d.toFixed(1)+'%')+'</span>'+
    '</div></td>';
}

function getColumns(){
  var cols=[];

  // === Режим документов ===
  if(view==='docs'){
    cols.push({k:'date', label:'Дата', render:function(r){
      var d=r.date?(('0'+r.date.getDate()).slice(-2)+'.'+('0'+(r.date.getMonth()+1)).slice(-2)+'.'+r.date.getFullYear()):'—';
      return '<td class="date-cell">'+d+'</td>';
    }});
    cols.push({k:'docNum', label:'Номер ДС', render:function(r){
      return '<td><span class="sku-cell">'+esc(r.docNum||'—')+'</span></td>';
    }});
    cols.push({k:'master', label:'Мастер', render:function(r){
      return '<td class="cm-cell">'+esc(r.master||'—')+'</td>';
    }});
    cols.push({k:'appeal', label:'Тип', render:function(r){
      var cls=r.appeal==='Брак'?'brak':r.appeal==='Руки'?'ruki':r.appeal==='Заявка'?'zayav':'';
      return '<td>'+(r.appeal&&cls?'<span class="tag '+cls+'">'+r.appeal+'</span>':esc(r.appeal||'—'))+'</td>';
    }});
    cols.push({k:'fault', label:'Неисправность', render:function(r){
      var v=r.fault||'';
      return '<td class="doc-text" title="'+esc(v)+'">'+esc(v||'—')+'</td>';
    }});
    cols.push({k:'diagnose', label:'Заключение', render:function(r){
      var v=r.diagnose||'';
      return '<td class="doc-text" title="'+esc(v)+'">'+esc(v||'—')+'</td>';
    }});
    return cols;
  }

  // === Режимы brands / skus ===
  if(view==='brands'){
    cols.push({k:'key', label:'Бренд', render:function(r){return '<td><span class="brand-cell">'+esc(r.key)+'</span></td>';}});
  } else {
    cols.push({k:'key', label:'Артикул', render:function(r){return '<td><span class="sku-cell">'+esc(r.key)+'</span></td>';}});
    cols.push({k:'name', label:'Наименование', render:function(r){return '<td class="name-cell" title="'+esc(r.name)+'">'+esc(r.name||'—')+'</td>';}});
    cols.push({k:'catMgr', label:'Кат. менеджер', render:function(r){return '<td class="cm-cell">'+esc(r.catMgr||'—')+'</td>';}});
  }
  cols.push({k:'total', label:'Всего', numeric:true, render:function(r){ return deltaCellNum(r.total, r.total_b); }});
  cols.push({k:'brak',  label:'Брак', numeric:true,
    render:function(r){
      if(!compareOn) return '<td class="num">'+(r.brak?'<span class="tag brak">'+r.brak+'</span>':'<span class="num-zero">·</span>')+'</td>';
      return deltaCellNum(r.brak, r.brak_b);
    }});
  cols.push({k:'ruki', label:'Руки', numeric:true,
    render:function(r){
      if(!compareOn) return '<td class="num">'+(r.ruki?'<span class="tag ruki">'+r.ruki+'</span>':'<span class="num-zero">·</span>')+'</td>';
      return deltaCellNum(r.ruki, r.ruki_b);
    }});
  cols.push({k:'zayav', label:'Заявка', numeric:true,
    render:function(r){
      if(!compareOn) return '<td class="num">'+(r.zayav?'<span class="tag zayav">'+r.zayav+'</span>':'<span class="num-zero">·</span>')+'</td>';
      return deltaCellNum(r.zayav, r.zayav_b);
    }});
  cols.push({k:'pctBrak', label:'% брака', numeric:true,
    render:function(r,maxPct){ return deltaCellPct(r.pctBrak, r.pctBrak_b, maxPct); }});

  if(compareOn){
    cols.push({k:'deltaPctBrak', label:'Δ % брака', numeric:true,
      render:function(r){
        var d=r.deltaPctBrak;
        var cls=Math.abs(d)<0.05?'neu':(d>0?'up':'down');
        var arrow=Math.abs(d)<0.05?'→':(d>0?'↑':'↓');
        return '<td class="num"><span class="cmp-delta '+cls+'" style="font-size:13px"><span class="cmp-arrow">'+arrow+'</span>'+(d===0?'0%':(d>0?'+':'')+d.toFixed(1)+'%')+'</span></td>';
      }});
  }
  return cols;
}

/* ============== HELPERS ============== */
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];}); }
